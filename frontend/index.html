<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Log Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b132b;
      color: white;
    }

    h1 {
      text-align: center;
      margin: 30px 0;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    .controls {
      text-align: center;
      margin-bottom: 20px;
    }

    select, input, button {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #1c2541;
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<h1>📊 Log Dashboard</h1>

<div class="container">

  <div class="controls">
    <select id="interval">
      <option value="second">Segundos</option>
      <option value="minute" selected>Minutos</option>
      <option value="hour">Horas</option>
    </select>

    <input type="datetime-local" id="startDate">
    <input type="datetime-local" id="endDate">

    <button onclick="loadDashboard()">Aplicar</button>
  </div>

  <div class="grid">
    <div class="card"><h3>📈 Logs</h3><canvas id="logsChart"></canvas></div>
    <div class="card"><h3>🚨 Errors</h3><canvas id="errorsChart"></canvas></div>
    <div class="card"><h3>🏆 Top Errors</h3><canvas id="topChart"></canvas></div>
    <div class="card"><h3>📊 Status</h3><canvas id="statusChart"></canvas></div>
    <div class="card"><h3>⏱ Avg Latency</h3><canvas id="latencyChart"></canvas></div>
    <div class="card"><h3>🔥 P95 / P99</h3><canvas id="percentileChart"></canvas></div>
  </div>

</div>

<script>
let logsChart, errorsChart, topChart, statusChart, latencyChart, percentileChart;

function formatDate(dateStr) {
  if (!dateStr) return null;
  return new Date(dateStr).toISOString();
}

function buildQuery() {
  const interval = document.getElementById("interval").value;
  const start = formatDate(document.getElementById("startDate").value);
  const end = formatDate(document.getElementById("endDate").value);

  let q = `interval=${interval}`;
  if (start) q += `&start_date=${start}`;
  if (end) q += `&end_date=${end}`;
  return q;
}

async function loadDashboard() {
  const q = buildQuery();

  const [
    logsRes,
    errorsRes,
    topRes,
    statusRes,
    latencyRes,
    percentileRes
  ] = await Promise.all([
    fetch(`http://127.0.0.1:8000/logs/metrics/timeseries?${q}`),
    fetch(`http://127.0.0.1:8000/logs/metrics/errors?${q}`),
    fetch(`http://127.0.0.1:8000/analytics/top-endpoints?errors_only=true&${q}`),
    fetch(`http://127.0.0.1:8000/analytics/status-codes`),
    fetch(`http://127.0.0.1:8000/analytics/latency?${q}`),
    fetch(`http://127.0.0.1:8000/analytics/latency/percentiles?${q}`)
  ]);

  const logs = await logsRes.json();
  const errors = await errorsRes.json();
  const top = await topRes.json();
  const status = await statusRes.json();
  const latency = await latencyRes.json();
  const percentiles = await percentileRes.json();

  const createOrUpdate = (chart, ctx, type, labels, dataSets) => {
    if (chart) {
      chart.data.labels = labels;
      chart.data.datasets = dataSets;
      chart.update();
      return chart;
    }
    return new Chart(ctx, { type, data: { labels, datasets: dataSets } });
  };

  logsChart = createOrUpdate(
    logsChart,
    document.getElementById("logsChart"),
    "line",
    logs.map(d => d.time),
    [{ label: "Logs", data: logs.map(d => d.count) }]
  );

  errorsChart = createOrUpdate(
    errorsChart,
    document.getElementById("errorsChart"),
    "line",
    errors.map(d => d.time),
    [{ label: "Errors", data: errors.map(d => d.errors) }]
  );

  topChart = createOrUpdate(
    topChart,
    document.getElementById("topChart"),
    "bar",
    top.map(d => d.endpoint),
    [{ label: "Errors", data: top.map(d => d.count) }]
  );

  statusChart = createOrUpdate(
    statusChart,
    document.getElementById("statusChart"),
    "pie",
    status.map(d => d.status_code),
    [{ data: status.map(d => d.count) }]
  );

  latencyChart = createOrUpdate(
    latencyChart,
    document.getElementById("latencyChart"),
    "bar",
    latency.map(d => d.endpoint),
    [{ label: "Avg", data: latency.map(d => d.avg_response_time) }]
  );

  percentileChart = createOrUpdate(
    percentileChart,
    document.getElementById("percentileChart"),
    "bar",
    percentiles.map(d => d.endpoint),
    [
      { label: "P95", data: percentiles.map(d => d.p95) },
      { label: "P99", data: percentiles.map(d => d.p99) }
    ]
  );
}

document.getElementById("interval")
  .addEventListener("change", loadDashboard);

loadDashboard();
</script>

</body>
</html>
